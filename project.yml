name: VoxType
options:
  bundleIdPrefix: com.voxtype
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.42"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.15.0"
targets:
  VoxTypeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VoxTypeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voxtype.tests
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: VoxType

  VoxType:
    type: application
    platform: macOS
    sources:
      - path: VoxType
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voxtype.app
        INFOPLIST_FILE: VoxType/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VoxType/Resources/VoxType.entitlements
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    entitlements:
      path: VoxType/Resources/VoxType.entitlements
      properties:
        com.apple.security.device.audio-input: true
    info:
      path: VoxType/Resources/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "VoxType needs microphone access for speech-to-text dictation."
        CFBundleDisplayName: "VoxType"
        CFBundleShortVersionString: "0.1.0"
